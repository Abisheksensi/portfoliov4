# .github/workflows/sync-tokens.yml
name: Deploy on Token Sync

on:
  push:
    paths:
      - '**/tokens.ts'
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./portfoliov4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './portfoliov4/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Notify success
        run: echo "✅ Tokens synced and Next.js deployed successfully!"
